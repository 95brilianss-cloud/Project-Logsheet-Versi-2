<body>

    <script src="js/config.js"></script>    <script src="js/state.js"></script>     <script src="js/utils.js"></script>     <script src="js/auth.js"></script>      <script src="js/users.js"></script>     <script src="js/logsheet.js"></script>  <script src="js/tpm.js"></script>       <script src="js/balancing.js"></script> <script src="js/main.js"></script>      <script>
        // Override untuk update UI user di Logsheet Selection Screen
        document.addEventListener('DOMContentLoaded', function() {
            const originalNavigateTo = window.navigateTo;
            window.navigateTo = function(screenId) {
                // Gunakan window.currentUser karena state dipisah ke file terpisah
                if (screenId === 'logsheetSelectScreen' && window.currentUser) {
                    const userEl = document.getElementById('logsheetSelectUser');
                    if (userEl) userEl.textContent = window.currentUser.name || window.currentUser.username;
                }
                if (typeof originalNavigateTo === 'function') {
                    originalNavigateTo(screenId);
                } else {
                    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                    const target = document.getElementById(screenId);
                    if (target) target.classList.add('active');
                }
            };
        });
    </script>
</body>
